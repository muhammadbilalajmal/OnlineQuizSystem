<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>QuizCloud — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #13131c;
        --border: #2a2a3d;
        --accent: #7c5cfc;
        --accent2: #fc5c7d;
        --text: #e8e8f0;
        --muted: #6b6b85;
        --success: #4ecca3;
      }

      html, body {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: "Syne", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 16px;
      }

      .container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 440px;
        padding: 0;
      }

      .logo {
        text-align: center;
        margin-bottom: clamp(20px, 4vh, 40px);
      }

      .logo-mark {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: clamp(22px, 5vw, 28px);
        letter-spacing: -0.5px;
      }

      .logo-icon {
        width: clamp(36px, 8vw, 44px);
        height: clamp(36px, 8vw, 44px);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(16px, 4vw, 20px);
        flex-shrink: 0;
      }

      .logo-sub {
        font-family: "Space Mono", monospace;
        font-size: clamp(9px, 2vw, 11px);
        color: var(--muted);
        margin-top: 6px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: clamp(20px, 5vw, 36px);
        box-shadow: 0 0 60px rgba(124, 92, 252, 0.08);
      }

      .tab-bar {
        display: flex;
        background: var(--bg);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: clamp(16px, 3vh, 28px);
        border: 1px solid var(--border);
      }

      .tab {
        flex: 1;
        padding: clamp(8px, 2vw, 10px);
        text-align: center;
        font-family: "Space Mono", monospace;
        font-size: clamp(11px, 2.5vw, 13px);
        color: var(--muted);
        cursor: pointer;
        border-radius: 9px;
        transition: all 0.2s;
        border: none;
        background: transparent;
      }

      .tab.active {
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }

      .role-select {
        display: flex;
        gap: clamp(8px, 2vw, 12px);
        margin-bottom: clamp(16px, 3vh, 24px);
      }

      .role-btn {
        flex: 1;
        padding: clamp(10px, 2.5vw, 14px) clamp(8px, 2vw, 14px);
        border: 2px solid var(--border);
        border-radius: 12px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-family: "Syne", sans-serif;
        font-size: clamp(12px, 2.8vw, 14px);
        font-weight: 700;
        transition: all 0.2s;
        text-align: center;
      }

      .role-btn .role-icon {
        display: block;
        font-size: clamp(18px, 5vw, 24px);
        margin-bottom: 4px;
      }

      .role-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }

      .role-btn.active {
        border-color: var(--accent);
        background: rgba(124, 92, 252, 0.12);
        color: var(--accent);
      }

      label {
        display: block;
        font-family: "Space Mono", monospace;
        font-size: clamp(9px, 2vw, 11px);
        color: var(--muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: clamp(11px, 2.5vw, 14px) clamp(12px, 3vw, 16px);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: "Space Mono", monospace;
        font-size: clamp(12px, 2.8vw, 14px);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        margin-bottom: clamp(12px, 2.5vh, 18px);
        /* -webkit-appearance: none; */
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
      }

      .btn {
        width: 100%;
        padding: clamp(12px, 3vw, 15px);
        background: linear-gradient(135deg, var(--accent), #9b6dff);
        border: none;
        border-radius: 12px;
        color: #fff;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: clamp(13px, 3vw, 15px);
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
        margin-top: 4px;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(124, 92, 252, 0.35);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .form-panel {
        display: none;
      }

      .form-panel.active {
        display: block;
      }

      #message {
        margin-top: 12px;
        padding: clamp(10px, 2.5vw, 12px) clamp(12px, 3vw, 16px);
        border-radius: 10px;
        font-family: "Space Mono", monospace;
        font-size: clamp(11px, 2.5vw, 13px);
        display: none;
        line-height: 1.5;
      }

      #message.error {
        background: rgba(252, 92, 125, 0.12);
        border: 1px solid rgba(252, 92, 125, 0.3);
        color: var(--accent2);
      }

      #message.success {
        background: rgba(78, 204, 163, 0.12);
        border: 1px solid rgba(78, 204, 163, 0.3);
        color: var(--success);
      }

      .demo-note {
        margin-top: 12px;
        padding: clamp(10px, 2.5vw, 12px);
        background: rgba(124, 92, 252, 0.08);
        border: 1px solid rgba(124, 92, 252, 0.2);
        border-radius: 10px;
        font-family: "Space Mono", monospace;
        font-size: clamp(9px, 2vw, 11px);
        color: var(--muted);
        text-align: center;
        line-height: 1.6;
      }

      /* Tablet adjustments */
      @media (min-width: 600px) and (max-width: 900px) {
        body {
          padding: 24px;
        }
      }

      /* Small phones */
      @media (max-width: 380px) {
        body {
          padding: 12px;
          align-items: flex-start;
          padding-top: 24px;
        }
        .logo {
          margin-bottom: 16px;
        }
      }

      /* Landscape phones */
      @media (max-height: 500px) and (orientation: landscape) {
        body {
          align-items: flex-start;
          padding: 12px 16px;
        }
        .logo {
          margin-bottom: 12px;
        }
        .logo-sub {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <div class="logo-mark">
          <div class="logo-icon">⚡</div>
          QuizCloud
        </div>
        <div class="logo-sub">Cloud-Based Quiz Platform</div>
      </div>
      <div class="card">
        <div class="tab-bar">
          <button class="tab active" onclick="switchTab('login')">
            Sign In
          </button>
          <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN -->
        <div class="form-panel active" id="loginPanel">
          <div class="role-select">
            <button
              class="role-btn active"
              id="loginTeacherBtn"
              onclick="setRole('teacher', 'login')"
            >
              <span class="role-icon">👩‍🏫</span>Teacher
            </button>
            <button
              class="role-btn"
              id="loginStudentBtn"
              onclick="setRole('student', 'login')"
            >
              <span class="role-icon">🎓</span>Student
            </button>
          </div>
          <label>Email Address</label>
          <input
            type="email"
            id="loginEmail"
            placeholder="you@university.edu"
            autocomplete="email"
          />
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
          <button class="btn" id="loginBtn" onclick="handleLogin()">
            Sign In →
          </button>
        </div>

        <!-- REGISTER -->
        <div class="form-panel" id="registerPanel">
          <div class="role-select">
            <button
              class="role-btn active"
              id="regTeacherBtn"
              onclick="setRole('teacher', 'reg')"
            >
              <span class="role-icon">👩‍🏫</span>Teacher
            </button>
            <button
              class="role-btn"
              id="regStudentBtn"
              onclick="setRole('student', 'reg')"
            >
              <span class="role-icon">🎓</span>Student
            </button>
          </div>
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" autocomplete="name" />
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@university.edu" autocomplete="email" />
          <label>Password</label>
          <input
            type="password"
            id="regPassword"
            placeholder="Min. 6 characters"
            autocomplete="new-password"
          />
          <button class="btn" id="regBtn" onclick="handleRegister()">
            Create Account →
          </button>
        </div>

        <div id="message"></div>
        <!-- <div class="demo-note">
          ⚡ No setup needed — data saved in your browser
        </div> -->
      </div>
    </div>

    <script type="module" src="./firebase-config.js"></script>
    <script type="module" src="./index.js"></script>
  </body>
</html>
