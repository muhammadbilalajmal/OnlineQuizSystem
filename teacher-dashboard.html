<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizCloud — Teacher Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #13131c;
      --surface2: #1a1a27;
      --border: #2a2a3d;
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --accent3: #ffc947;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --success: #4ecca3;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .sidebar-section {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      margin-bottom: 4px;
    }

    .nav-link:hover,
    .nav-link.active {
      background: rgba(124, 92, 252, 0.12);
      color: var(--accent);
    }

    .nav-icon {
      font-size: 16px;
    }

    .sidebar-bottom {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 700;
    }

    .user-role {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-logout {
      width: 100%;
      padding: 10px;
      background: rgba(252, 92, 125, 0.1);
      border: 1px solid rgba(252, 92, 125, 0.2);
      border-radius: 10px;
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: rgba(252, 92, 125, 0.2);
    }

    /* MAIN */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 36px 40px;
      overflow-y: auto;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .page-sub {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
    }

    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), #b08dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card.c2 .stat-value {
      background: linear-gradient(135deg, var(--accent2), #ff8fa3);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .stat-card.c3 .stat-value {
      background: linear-gradient(135deg, var(--accent3), #ffdf90);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .stat-card.c4 .stat-value {
      background: linear-gradient(135deg, var(--success), #82f5d5);
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b6dff);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124, 92, 252, 0.35);
    }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-danger {
      background: rgba(252, 92, 125, 0.12);
      border: 1px solid rgba(252, 92, 125, 0.25);
      color: var(--accent2);
    }

    .btn-danger:hover {
      background: rgba(252, 92, 125, 0.22);
    }

    .btn-success {
      background: rgba(78, 204, 163, 0.12);
      border: 1px solid rgba(78, 204, 163, 0.25);
      color: var(--success);
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 12px;
    }

    /* QUIZ LIST */
    .quiz-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }

    .quiz-card:hover {
      border-color: rgba(124, 92, 252, 0.4);
    }

    .quiz-meta {
      flex: 1;
    }

    .quiz-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .quiz-info {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .quiz-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-active {
      background: rgba(78, 204, 163, 0.15);
      color: var(--success);
      border: 1px solid rgba(78, 204, 163, 0.25);
    }

    .badge-draft {
      background: rgba(107, 107, 133, 0.15);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .badge-closed {
      background: rgba(252, 92, 125, 0.1);
      color: var(--accent2);
      border: 1px solid rgba(252, 92, 125, 0.2);
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* QUESTION BUILDER */
    .question-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
    }

    .q-number {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .option-row input[type="radio"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .option-row input[type="text"] {
      margin-bottom: 0;
    }

    /* EMPTY / LOADING */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-text {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .empty-sub {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 999;
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.success {
      border-color: rgba(78, 204, 163, 0.4);
      color: var(--success);
    }

    #toast.error {
      border-color: rgba(252, 92, 125, 0.4);
      color: var(--accent2);
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">⚡</div>QuizCloud
    </div>
    <div class="sidebar-section">Menu</div>
    <button class="nav-link active" onclick="showSection('quizzes',this)"><span class="nav-icon">📋</span> My
      Quizzes</button>
    <button class="nav-link" onclick="showSection('results',this)"><span class="nav-icon">📊</span> Results</button>
    <button class="nav-link" onclick="showSection('students',this)"><span class="nav-icon">🎓</span> Students</button>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <div class="avatar" id="sidebarAvatar">T</div>
        <div>
          <div class="user-name" id="sidebarName">Teacher</div>
          <div class="user-role">Teacher</div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </aside>

  <main class="main">

    <!-- QUIZZES -->
    <div id="sectionQuizzes">
      <div class="page-header">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <h1 class="page-title">My Quizzes</h1>
            <p class="page-sub">Create and manage your quizzes</p>
          </div>
          <button class="btn btn-primary" onclick="openCreateModal()">＋ Create Quiz</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Quizzes</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-card c2">
          <div class="stat-label">Active</div>
          <div class="stat-value" id="statActive">0</div>
        </div>
        <div class="stat-card c3">
          <div class="stat-label">Submissions</div>
          <div class="stat-value" id="statSubs">0</div>
        </div>
        <div class="stat-card c4">
          <div class="stat-label">Avg Score</div>
          <div class="stat-value" id="statAvg">—</div>
        </div>
      </div>
      <div class="section-header">
        <h2 class="section-title">All Quizzes</h2>
      </div>
      <div class="quiz-list" id="quizList"></div>
    </div>

    <!-- RESULTS -->
    <div id="sectionResults" style="display:none;">
      <div class="page-header">
        <h1 class="page-title">Student Results</h1>
        <p class="page-sub">All quiz submissions</p>
      </div>
      <div class="quiz-list" id="resultsList"></div>
    </div>

    <!-- STUDENTS -->
    <div id="sectionStudents" style="display:none;">
      <div class="page-header">
        <h1 class="page-title">Registered Students</h1>
        <p class="page-sub">All student accounts</p>
      </div>
      <div class="quiz-list" id="studentList"></div>
    </div>

  </main>

  <!-- CREATE QUIZ MODAL -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Create New Quiz</h2>
        <button class="modal-close" onclick="closeModal('createModal')">✕</button>
      </div>
      <div class="form-group"><label class="form-label">Quiz Title</label><input type="text" id="quizTitle"
          placeholder="e.g. Cloud Computing Midterm" /></div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="quizDesc"
          placeholder="Brief description..."></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group"><label class="form-label">Time Limit (mins)</label><input type="number" id="quizTime"
            placeholder="30" min="1" max="180" value="30" /></div>
        <div class="form-group"><label class="form-label">Pass Mark (%)</label><input type="number" id="quizPass"
            placeholder="60" min="1" max="100" value="60" /></div>
      </div>
      <div class="section-header" style="margin-top:10px;">
        <h3 style="font-size:15px;font-weight:800;">Questions</h3>
        <button class="btn btn-secondary btn-sm" onclick="addQuestion()">＋ Add Question</button>
      </div>
      <div id="questionsContainer"></div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn btn-secondary" style="flex:1" onclick="saveQuizBtn('draft')">Save as Draft</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveQuizBtn('active')">Publish Quiz</button>
      </div>
    </div>
  </div>

  <!-- VIEW QUIZ MODAL -->
  <div class="modal-overlay" id="viewModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="viewModalTitle">Quiz Details</h2>
        <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
      </div>
      <div id="viewModalBody"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./teacher-dashboard.js"></script>
</body>

</html>
